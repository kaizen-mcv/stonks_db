name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-smoke:
    name: Lint + Smoke Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff lint
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

      - name: Smoke test (CLI imports)
        run: |
          python -c "from stonks.cli import app; print('CLI OK')"
          python -c "import stonks.models; print('Models OK')"
          python -c "from stonks.fetchers.base import BaseFetcher; print('Fetchers OK')"

      - name: Smoke test (CLI --help)
        run: stonks --help
